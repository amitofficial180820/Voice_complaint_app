<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Complaint — AK Jewels</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --g0:#0a1a0f;--g1:#0f2a17;--g2:#163d22;--g3:#1e5730;
      --g4:#27723e;--g5:#2ea04f;--g6:#4eca6f;--g7:#80e89a;
      --g8:#b8f5c8;--g9:#e8fdef;
      --gold:#c9a84c;--gold2:#f0d080;
      --white:#f5fdf7;--err:#e05252;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;background:var(--g0);
      display:flex;align-items:center;justify-content:center;
      font-family:'DM Sans',sans-serif;overflow:hidden;position:relative;
    }
    body::before,body::after{
      content:'';position:fixed;border-radius:50%;
      filter:blur(80px);opacity:.18;
      animation:drift 10s ease-in-out infinite alternate;pointer-events:none;
    }
    body::before{width:600px;height:600px;background:radial-gradient(circle,var(--g5),transparent 70%);top:-150px;left:-150px;}
    body::after{width:500px;height:500px;background:radial-gradient(circle,var(--gold),transparent 70%);bottom:-100px;right:-100px;animation-delay:-4s;}
    @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.08);}}

    .card{
      position:relative;width:min(440px,94vw);
      background:linear-gradient(145deg,var(--g1) 0%,var(--g0) 100%);
      border:1px solid rgba(78,202,111,.15);border-radius:28px;
      padding:44px 36px 40px;
      box-shadow:0 0 0 1px rgba(78,202,111,.07),0 30px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(78,202,111,.12);
      z-index:10;animation:cardIn .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

    .brand{text-align:center;margin-bottom:32px;}
    .brand-icon{
      width:48px;height:48px;margin:0 auto 12px;
      background:linear-gradient(135deg,var(--g3),var(--g5));
      border-radius:14px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(46,160,79,.3);
    }
    .brand-icon svg{width:24px;height:24px;fill:var(--g8);}
    .brand h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--white);letter-spacing:.02em;}
    .brand p{font-size:12px;color:var(--g7);letter-spacing:.08em;text-transform:uppercase;margin-top:4px;opacity:.7;}

    .visualizer-wrap{position:relative;height:80px;margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:3px;overflow:hidden;}
    .bar{width:3px;border-radius:10px;background:var(--g4);transition:background .3s;}
    .bar.active{background:var(--g6);}
    .idle-text{position:absolute;color:rgba(78,202,111,.35);font-size:13px;letter-spacing:.05em;pointer-events:none;transition:opacity .4s;}
    .idle-text.hidden{opacity:0;}

    .timer{
      text-align:center;font-family:'Cormorant Garamond',serif;
      font-size:48px;font-weight:600;color:var(--g7);letter-spacing:.04em;
      margin-bottom:28px;min-height:58px;transition:color .3s;
    }
    .timer.recording{color:var(--g6);}
    .timer.playing{color:var(--gold2);}

    .status-pill{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:28px;min-height:26px;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--g4);transition:background .3s;}
    .dot.rec{background:var(--err);animation:pd 1s infinite;}
    .dot.play{background:var(--gold);animation:pd 1.3s infinite;}
    .dot.send{background:var(--g6);animation:pd .8s infinite;}
    @keyframes pd{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
    .status-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--g7);opacity:.6;transition:opacity .3s,color .3s;}
    .status-label.rec{opacity:1;color:#e07070;}
    .status-label.play{opacity:1;color:var(--gold2);}
    .status-label.send{opacity:1;color:var(--g6);}
    .status-label.done{opacity:1;color:var(--g8);}

    .progress-bar-wrap{height:4px;background:rgba(78,202,111,.1);border-radius:10px;margin-bottom:20px;overflow:hidden;transition:opacity .3s;}
    .progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--g5),var(--gold));border-radius:10px;width:0%;transition:width .15s linear;}

    .btn-row{display:flex;gap:12px;margin-bottom:14px;}

    .btn-record{
      flex:1;height:64px;border-radius:18px;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:.04em;
      transition:all .25s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;
      background:linear-gradient(135deg,var(--g3),var(--g5));color:var(--g9);
      box-shadow:0 4px 24px rgba(46,160,79,.3);
      display:flex;align-items:center;justify-content:center;gap:9px;
    }
    .btn-record:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(46,160,79,.45);}
    .btn-record:active:not(:disabled){transform:scale(.97);}
    .btn-record.recording{background:linear-gradient(135deg,#7a1a1a,var(--err));box-shadow:0 4px 24px rgba(224,82,82,.35);}
    .btn-record:disabled{opacity:.4;cursor:not-allowed;}
    .btn-record .rec-ring{position:absolute;inset:0;border-radius:18px;border:2px solid rgba(255,255,255,.2);}
    .btn-record.recording .rec-ring{animation:rp 1.2s ease-out infinite;}
    @keyframes rp{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.06);opacity:0;}}

    .btn-play{
      width:64px;height:64px;border-radius:18px;
      border:1.5px solid rgba(78,202,111,.25);background:rgba(46,160,79,.1);
      color:var(--g7);cursor:pointer;transition:all .25s;
      display:flex;align-items:center;justify-content:center;
    }
    .btn-play:hover:not(:disabled){background:rgba(46,160,79,.2);border-color:var(--g5);transform:translateY(-2px);}
    .btn-play:active:not(:disabled){transform:scale(.96);}
    .btn-play:disabled{opacity:.3;cursor:not-allowed;}
    .btn-play svg{width:22px;height:22px;fill:currentColor;}
    .btn-play.playing{color:var(--gold);border-color:var(--gold);}

    .btn-send{
      width:100%;height:58px;border-radius:16px;border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--g3),var(--g5));color:var(--g9);
      font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;letter-spacing:.05em;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .3s cubic-bezier(.22,1,.36,1);
      box-shadow:0 4px 20px rgba(46,160,79,.3);position:relative;overflow:hidden;
    }
    .btn-send:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(46,160,79,.45);background:linear-gradient(135deg,var(--g4),var(--g6));}
    .btn-send:active:not(:disabled){transform:scale(.98);}
    .btn-send:disabled{opacity:.35;cursor:not-allowed;}
    .btn-send svg{width:20px;height:20px;fill:currentColor;}

    .upload-track{width:100%;height:5px;background:rgba(78,202,111,.1);border-radius:10px;margin-top:12px;overflow:hidden;display:none;}
    .upload-fill{height:100%;background:linear-gradient(90deg,var(--g5),var(--g7));border-radius:10px;width:0%;transition:width .4s ease;}

    /* Success overlay */
    .success-overlay{
      display:none;position:absolute;inset:0;border-radius:28px;
      background:linear-gradient(145deg,var(--g1),var(--g0));
      z-index:20;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;animation:fadeIn .4s ease;
    }
    .success-overlay.show{display:flex;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .success-icon{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(135deg,var(--g3),var(--g5));
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 40px rgba(46,160,79,.4);
      animation:popIn .5s cubic-bezier(.22,1,.36,1);
    }
    @keyframes popIn{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
    .success-icon svg{width:34px;height:34px;fill:var(--g9);}
    .success-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--white);font-weight:700;}
    .success-sub{font-size:13px;color:var(--g7);opacity:.7;text-align:center;line-height:1.6;max-width:260px;}
    .success-file{font-size:11px;color:var(--g6);opacity:.8;letter-spacing:.04em;background:rgba(46,160,79,.1);padding:6px 14px;border-radius:20px;}
    .btn-again{
      margin-top:8px;padding:10px 28px;border-radius:12px;
      border:1.5px solid rgba(78,202,111,.3);background:transparent;
      color:var(--g7);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;
    }
    .btn-again:hover{background:rgba(78,202,111,.1);}

    .toast{
      position:fixed;bottom:30px;left:50%;
      transform:translateX(-50%) translateY(100px);
      background:var(--g2);border:1px solid rgba(78,202,111,.3);
      color:var(--g8);padding:12px 24px;border-radius:40px;
      font-size:13px;letter-spacing:.04em;z-index:100;
      transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s;
      opacity:0;pointer-events:none;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    .divider{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .divider-line{flex:1;height:1px;background:rgba(78,202,111,.1);}
    .divider-text{font-size:11px;letter-spacing:.08em;color:rgba(78,202,111,.3);text-transform:uppercase;}
    .drive-hint{text-align:center;font-size:11px;color:rgba(78,202,111,.3);letter-spacing:.04em;margin-top:14px;}
    .drive-hint span{color:var(--g6);opacity:.7;}
  </style>
</head>
<body>

<div class="card" id="mainCard">

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <div class="success-title">Complaint Sent!</div>
    <div class="success-sub">Your voice note was uploaded to Google Drive — AK Jewels Complaints folder.</div>
    <div class="success-file" id="successFile">complaint_recording.webm</div>
    <button class="btn-again" onclick="resetAll()">Record Another</button>
  </div>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 3a3 3 0 0 1 3 3v4a3 3 0 0 1-6 0V8a3 3 0 0 1 3-3zm6.94 9A7 7 0 0 1 5.06 14H6.1a5.98 5.98 0 0 0 11.8 0h1.04z"/></svg>
    </div>
    <h1>Voice Complaint</h1>
    <p>AK Jewels · Support</p>
  </div>

  <div class="visualizer-wrap" id="vizWrap">
    <div class="idle-text" id="idleText">Tap record to begin</div>
  </div>

  <div class="timer" id="timer">0:00</div>

  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Ready</span>
  </div>

  <div class="progress-bar-wrap" id="progressWrap" style="opacity:0">
    <div class="progress-bar-inner" id="progressBar"></div>
  </div>

  <div class="btn-row">
    <button class="btn-record" id="btnRecord" onclick="toggleRecord()">
      <div class="rec-ring"></div>
      <svg id="recIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
      <span id="recLabel">Record</span>
    </button>
    <button class="btn-play" id="btnPlay" disabled onclick="togglePlay()">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">Submit Complaint</span>
    <div class="divider-line"></div>
  </div>

  <button class="btn-send" id="btnSend" disabled onclick="sendComplaint()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    <span id="sendLabel">Send Complaint</span>
  </button>

  <div class="upload-track" id="uploadTrack">
    <div class="upload-fill" id="uploadFill"></div>
  </div>

  <p class="drive-hint">Saved to <span>Google Drive</span> › AK Jewels Complaints</p>
</div>

<div class="toast" id="toast"></div>

<script>
  let mediaRecorder=null,audioChunks=[],audioBlob=null,audioURL=null,audioEl=null;
  let timerInterval=null,elapsed=0,isRecording=false,isPlaying=false;
  let analyser=null,animFrame=null,bars=[];

  const vizWrap=document.getElementById('vizWrap');
  for(let i=0;i<48;i++){const b=document.createElement('div');b.className='bar';b.style.height='6px';vizWrap.appendChild(b);bars.push(b);}

  function showToast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
  function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
  function setStatus(mode,text){
    const d=document.getElementById('statusDot'),l=document.getElementById('statusLabel');
    d.className='dot'+(mode?' '+mode:'');l.className='status-label'+(mode?' '+mode:'');l.textContent=text||'Ready';
  }
  function animBars(data){
    bars.forEach((b,i)=>{
      const v=data?data[Math.floor(i*data.length/48)]:0;
      b.style.height=isRecording?Math.max(6,(v/255)*72)+'px':'6px';
      b.classList.toggle('active',isRecording&&v>30);
    });
  }
  function startViz(){
    if(!analyser)return;
    const d=new Uint8Array(analyser.frequencyBinCount);
    function loop(){analyser.getByteFrequencyData(d);animBars(d);animFrame=requestAnimationFrame(loop);}
    loop();
  }
  function stopViz(){if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}animBars(null);}

  async function toggleRecord(){isRecording?stopRecording():await startRecording();}

  async function startRecording(){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx=new AudioContext();
      analyser=ctx.createAnalyser();analyser.fftSize=256;
      ctx.createMediaStreamSource(stream).connect(analyser);
      audioChunks=[];
      mediaRecorder=new MediaRecorder(stream);
      mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
      mediaRecorder.onstop=()=>{
        audioBlob=new Blob(audioChunks,{type:'audio/webm'});
        audioURL=URL.createObjectURL(audioBlob);
        audioEl=new Audio(audioURL);
        audioEl.onended=()=>{isPlaying=false;setPlayBtn(false);setStatus('done','Recording saved');document.getElementById('progressWrap').style.opacity=0;};
        audioEl.ontimeupdate=()=>{if(audioEl.duration)document.getElementById('progressBar').style.width=(audioEl.currentTime/audioEl.duration*100)+'%';};
        document.getElementById('btnPlay').disabled=false;
        document.getElementById('btnSend').disabled=false;
        setStatus('done','Recording saved');
        showToast('✓ Ready — press Send to upload');
      };
      mediaRecorder.start();isRecording=true;elapsed=0;
      document.getElementById('timer').className='timer recording';
      timerInterval=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=fmt(elapsed);},1000);
      document.getElementById('btnRecord').classList.add('recording');
      document.getElementById('recLabel').textContent='Stop';
      document.getElementById('recIcon').innerHTML='<rect x="6" y="6" width="12" height="12" rx="2"/>';
      document.getElementById('idleText').classList.add('hidden');
      setStatus('rec','Recording…');startViz();
    }catch(e){showToast('⚠ Microphone access denied');}
  }

  function stopRecording(){
    if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    isRecording=false;clearInterval(timerInterval);stopViz();
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('recLabel').textContent='Re-record';
    document.getElementById('recIcon').innerHTML='<circle cx="12" cy="12" r="6"/>';
    document.getElementById('timer').className='timer';
    document.getElementById('idleText').classList.remove('hidden');
    document.getElementById('idleText').textContent='Tap to re-record';
  }

  function setPlayBtn(p){
    document.getElementById('btnPlay').classList.toggle('playing',p);
    document.getElementById('playIcon').innerHTML=p?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
  }
  function togglePlay(){
    if(!audioEl)return;
    if(isPlaying){audioEl.pause();isPlaying=false;setPlayBtn(false);setStatus('done','Recording saved');}
    else{audioEl.currentTime=0;audioEl.play();isPlaying=true;setPlayBtn(true);setStatus('play','Playing…');document.getElementById('progressWrap').style.opacity=1;}
  }

  async function sendComplaint(){
    if(!audioBlob)return;
    const btn=document.getElementById('btnSend');
    const lbl=document.getElementById('sendLabel');
    const track=document.getElementById('uploadTrack');
    const fill=document.getElementById('uploadFill');

    btn.disabled=true;lbl.textContent='Uploading…';
    track.style.display='block';
    setStatus('send','Uploading to Drive…');

    let prog=0;
    const pi=setInterval(()=>{prog=Math.min(prog+Math.random()*7,82);fill.style.width=prog+'%';},350);

    try{
      const base64=await blobToBase64(audioBlob);
      const fileName='complaint_'+new Date().toISOString().replace(/[T:.Z]/g,'-').slice(0,19)+'.webm';

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          mcp_servers:[{type:'url',url:'https://drivemcp.googleapis.com/mcp/v1',name:'gdrive'}],
          system:`You upload a base64 audio file to Google Drive.
1. Search for folder "AK Jewels Complaints". Create it if missing.
2. Upload the audio as filename provided into that folder.
3. Respond ONLY with JSON: {"success":true,"fileId":"...","fileName":"..."} or {"success":false,"error":"..."}. No other text.`,
          messages:[{
            role:'user',
            content:`Upload this voice complaint recording.
Filename: ${fileName}
MimeType: audio/webm
Folder: AK Jewels Complaints
Base64: ${base64}`
          }]
        })
      });

      clearInterval(pi);
      if(!res.ok)throw new Error('API '+res.status);
      const data=await res.json();
      const raw=(data.content?.find(b=>b.type==='text')?.text||'');
      let result;
      try{const m=raw.match(/\{[\s\S]*\}/);result=JSON.parse(m?m[0]:raw);}
      catch{result={success:false,error:'Bad response'};}

      fill.style.width='100%';
      await new Promise(r=>setTimeout(r,500));

      if(result.success){
        document.getElementById('successFile').textContent=result.fileName||fileName;
        document.getElementById('successOverlay').classList.add('show');
      }else{
        throw new Error(result.error||'Upload failed');
      }
    }catch(err){
      clearInterval(pi);
      fill.style.width='0%';track.style.display='none';
      btn.disabled=false;lbl.textContent='Send Complaint';
      setStatus('','Ready');
      showToast('⚠ '+( err.message||'Upload failed — try again'),4000);
      console.error(err);
    }
  }

  function blobToBase64(blob){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;r.readAsDataURL(blob);
    });
  }

  function resetAll(){
    audioBlob=null;audioURL=null;audioEl=null;elapsed=0;
    document.getElementById('timer').textContent='0:00';
    document.getElementById('timer').className='timer';
    document.getElementById('btnPlay').disabled=true;
    document.getElementById('btnSend').disabled=true;
    document.getElementById('sendLabel').textContent='Send Complaint';
    document.getElementById('uploadTrack').style.display='none';
    document.getElementById('uploadFill').style.width='0%';
    document.getElementById('progressWrap').style.opacity=0;
    document.getElementById('progressBar').style.width='0%';
    document.getElementById('idleText').textContent='Tap record to begin';
    document.getElementById('idleText').classList.remove('hidden');
    document.getElementById('recLabel').textContent='Record';
    document.getElementById('recIcon').innerHTML='<circle cx="12" cy="12" r="6"/>';
    document.getElementById('btnRecord').classList.remove('recording');
    setStatus('','Ready');
    document.getElementById('successOverlay').classList.remove('show');
    bars.forEach(b=>{b.style.height='6px';b.classList.remove('active');});
  }
</script>
</body>
</html>
